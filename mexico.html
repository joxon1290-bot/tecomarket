<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>TecoMarket World Cup 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial;
}

body{
margin:0;
font-family: "Segoe UI", Arial;
color:white;
overflow-x:hidden;
background:none;
}
   

/* FONDOS CIRCULARES */

.circle{
position:absolute;
border-radius:50%;
filter:blur(2px);
opacity:0.25;
}

.c1{
width:400px;
height:400px;
background:#ff3b3b;
top:50px;
right:-150px;
}

.c2{
width:350px;
height:350px;
background:#ffd23f;
top:400px;
left:150px;
}

.c3{
width:250px;
height:250px;
background:#1ec97f;
top:150px;
left:-100px;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px 60px 20px;
position:relative;
z-index:2;
}

.badge{
display:inline-block;
background:#7b1d24;
padding:8px 18px;
border-radius:20px;
font-size:14px;
margin-bottom:20px;
}

.hero h1{
font-size:70px;
color:#f3c430;
letter-spacing:2px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:18px;
color:#d8d8d8;
line-height:1.6;
}

.date{
margin-top:30px;
display:inline-block;
background:#0c7a4e;
padding:14px 28px;
border-radius:30px;
font-weight:bold;
font-size:16px;
}

/* VIDEO */

.video-container{
margin:80px auto;
max-width:900px;
border:3px solid #f3c430;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

video{
width:100%;
display:block;
}

/* SECCIONES */

.section{
max-width:900px;
margin:80px auto;
padding:45px;
border-radius:20px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
}

.section h2{
font-size:36px;
color:#f3c430;
margin-bottom:20px;
}

.section p{
font-size:18px;
line-height:1.7;
color:#d9d9d9;
}

/* TAGS */

.tags{
margin-top:25px;
}

.tag{
display:inline-block;
padding:10px 18px;
border-radius:25px;
margin:6px;
font-size:14px;
}

.red{background:#a1222c;}
.yellow{background:#d6a41d;}
.green{background:#139c63;}
.dark{background:#7b1d24;}

/* ANIMACIÓN SCROLL */

.section{
opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
}

.section.show{
opacity:1;
transform:translateY(0);
}
    
#contador{
margin-top:25px;
font-size:28px;
font-weight:bold;
color:#f3c430;
}

    .ball{
position:fixed;
bottom:20px;
left:20px;
font-size:40px;
animation:flotar 6s infinite ease-in-out;
}

.ball2{
position:fixed;
top:200px;
right:30px;
font-size:35px;
animation:flotar 8s infinite ease-in-out;
}

@keyframes flotar{

0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}

}

/* FONDO ESTADIO */

.stadium-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
180deg,
#041f19 0%,
#063d2f 40%,
#0c7a4e 100%
);
z-index:-1;
overflow:hidden;
}

/* líneas del campo */

.stadium-bg::before{

content:"";
position:absolute;
width:200%;
height:200%;
background-image:
repeating-linear-gradient(
90deg,
rgba(255,255,255,0.05) 0px,
rgba(255,255,255,0.05) 2px,
transparent 2px,
transparent 80px
);

animation:campoMover 25s linear infinite;

}

/* animación */

@keyframes campoMover{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-200px);
}

}

    /* LUCES DE ESTADIO */

.stadium-lights{
position:fixed;
top:0;
left:0;
width:100%;
height:150px;
display:flex;
justify-content:space-around;
pointer-events:none;
z-index:1;
}

.light{
width:120px;
height:120px;
background:radial-gradient(circle,
rgba(255,255,200,0.9) 0%,
rgba(255,255,150,0.6) 30%,
rgba(255,255,120,0.2) 60%,
transparent 80%
);
border-radius:50%;
filter:blur(8px);
animation:parpadeo 3s infinite alternate;
}

.light:nth-child(2){animation-delay:0.5s;}
.light:nth-child(3){animation-delay:1s;}
.light:nth-child(4){animation-delay:1.5s;}
.light:nth-child(5){animation-delay:2s;}

@keyframes parpadeo{

0%{
opacity:0.6;
transform:scale(1);
}

100%{
opacity:1;
transform:scale(1.15);
}

}

.img-infografia{
width:100%;
max-width:900px;
height:auto;
display:block;
margin:auto;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
}

.img-infografia:hover{
transform:scale(1.03);
}
    
    .img-infografia:hover{
transform:scale(1.05);
filter:brightness(1.1);
}
    
    /* 🔹 Reset general */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* 🔹 Evita espacio lateral raro */
html, body {
  width: 100%;
  overflow-x: hidden;
}

/* 🔹 Ajuste general del body */
body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
}

/* 🔹 Contenedor principal */
.container {
  width: 100%;
  max-width: 100%;
  padding: 10px;
}

/* 🔹 Imágenes responsivas */
img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* 🔹 Botones (para que no se desacomoden) */
button, .btn {
  width: 100%;
  max-width: 200px;
}



/* 🔹 Ajustes SOLO para celular */
@media (max-width: 768px) {

  h1 {
    font-size: 26px;
    text-align: center;
  }

  p {
    font-size: 14px;
    text-align: center;
  }

  .botones {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

}
    
/* 🔥 FIX FINAL PARA CELULAR */
@media (max-width: 768px){

  /* Oculta elementos que rompen el layout */
  .circle{
    display:none;
  }

  .ball2{
    display:none;
  }

  /* Ajusta título */
  .hero h1{
    font-size:32px;
  }

  /* Ajusta sección */
  .section{
    width:90%;
    padding:20px;
    margin:40px auto;
  }

  /* Video más compacto */
  .video-container{
    width:90%;
    margin:40px auto;
  }

  /* Botones bien acomodados */
  .menu-regiones{
    flex-direction:column;
    align-items:center;
    gap:12px;
  }

  .btn-region{
    width:80%;
    text-align:center;
  }

}
</style>
     </head>

<body>
   
    <div class="stadium-bg"></div>
    <div class="stadium-lights">
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
</div>
<div class="ball">⚽</div>
<div class="ball2">⚽</div>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="hero">

<div class="badge">🌎 UAG HIGHSCHOOL · 6TO SEMESTRE</div>

<h1>MÉXICO<br>TECOMARKET 2026</h1>
    
    <div class="date">📅 23 de Abril · UAG Highschool</div>
    <div id="contador"></div>

</div>
    
    <div class="section">
<h2>COMIDA MEXICANA</h2>

<img src="mexico.jpeg"  class="img-infografia" style="width:100%;">
    
</div>
    
    <script>

/* animación al hacer scroll */

const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {

sections.forEach(sec => {

const top = sec.getBoundingClientRect().top;
const trigger = window.innerHeight - 100;

if(top < trigger){
sec.classList.add("show");
}

});

});

</script>
    <script>

const fechaEvento = new Date("April 23, 2026 00:00:00").getTime();

const contador = setInterval(function(){

const ahora = new Date().getTime();
const distancia = fechaEvento - ahora;

const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

document.getElementById("contador").innerHTML =
"⏳ Faltan " + dias + "d " + horas + "h " + minutos + "m " + segundos + "s";

},1000);

</script>
</body>
</html>
